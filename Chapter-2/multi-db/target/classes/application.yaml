spring:
  application:
    name: demo
  mongodb:
    uri: mongodb://root:rootpassword@localhost:27017/app_collection?authSource=admin
    auto-index-creation: true

  datasource:
    url: jdbc:postgresql://localhost:5432/app_database
    username: admin
    password: secretpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

